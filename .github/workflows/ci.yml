name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    name: Validate 1C XML dump
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate configuration structure
        shell: pwsh
        run: ./scripts/validate-cf.ps1
